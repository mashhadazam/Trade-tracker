<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trade Tracker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Local Journal</p>
          <h1>Trade Tracker</h1>
        </div>
        <div class="status" id="status">Checking server</div>
      </section>

      <section class="metrics" aria-label="Dashboard metrics">
        <article>
          <span>Total P/L</span>
          <strong id="totalPnl">$0.00</strong>
        </article>
        <article>
          <span>Win Rate</span>
          <strong id="winRate">0%</strong>
        </article>
        <article>
          <span>Trades</span>
          <strong id="tradeCount">0</strong>
        </article>
        <article>
          <span>R Multiple</span>
          <strong id="rMultiple">0.00</strong>
        </article>
      </section>

      <section class="workspace">
        <form id="tradeForm" class="panel">
          <h2>New Trade</h2>
          <label>
            Symbol
            <input name="symbol" placeholder="AAPL" required>
          </label>
          <label>
            Side
            <select name="side" required>
              <option value="LONG">Long</option>
              <option value="SHORT">Short</option>
            </select>
          </label>
          <label>
            Setup
            <input name="setup_tag" placeholder="Breakout" required>
          </label>
          <div class="split">
            <label>
              Qty
              <input name="qty" type="number" min="0.0001" step="0.0001" required>
            </label>
            <label>
              Entry
              <input name="entry_price" type="number" min="0.0001" step="0.01" required>
            </label>
          </div>
          <div class="split">
            <label>
              Risk
              <input name="risk_amount" type="number" min="0.01" step="0.01" required>
            </label>
            <label>
              P/L
              <input name="pnl" type="number" step="0.01" required>
            </label>
          </div>
          <label>
            Notes
            <textarea name="notes" rows="3" placeholder="What happened?"></textarea>
          </label>
          <button type="submit">Add Trade</button>
          <p class="message" id="formMessage"></p>
        </form>

        <section class="panel table-panel">
          <div class="panel-head">
            <h2>Recent Trades</h2>
            <button type="button" id="refreshButton">Refresh</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Side</th>
                  <th>Setup</th>
                  <th>Qty</th>
                  <th>Entry</th>
                  <th>P/L</th>
                </tr>
              </thead>
              <tbody id="tradesBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
